<!doctype html>
<html lang="en">
    <head>
        <title>MiroTalk WebRTC C2C end-to-end encrypted</title>

        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
        />
        <meta
            name="description"
            content="MiroTalk C2C WebRTC real-time cam-2-cam video calls and screen sharing, end-to-end encrypted."
        />

        <meta property="og:type" content="app-webrtc" />
        <meta property="og:site_name" content="MiroTalk C2C" />
        <meta property="og:title" content="Click the link to join this call." />
        <meta property="og:description" content="Free WebRTC cam-2-cam video calls." />
        <meta property="og:image" content="https://c2c.mirotalk.com/images/ui.png" />
        <meta property="og:url" content="https://c2c.mirotalk.com" />

        <link rel="apple-touch-icon" href="../images/favicon.png" />
        <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
        <link rel="stylesheet" href="../css/home.css" />
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />

        <script async src="../js/stats.js"></script>

        <script defer src="https://cdn.jsdelivr.net/npm/xss/dist/xss.min.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script defer src="../js/home.js"></script>
    </head>
    <body>
        <form id="joinForm" autocomplete="off" class="join-form">
            <div class="form-header">
                <div class="form-logo">
                    <img src="../images/logo.svg" alt="MiroTalk" />
                </div>
                <h2>Start a Video Call</h2>
                <p>Connect face-to-face, instantly</p>
            </div>

            <div class="input-group">
                <label for="room"><i class="fas fa-door-open"></i> Room</label>
                <div class="input-container">
                    <input
                        id="roomIdInput"
                        type="text"
                        name="room"
                        placeholder="e.g. my-meeting"
                        maxlength="36"
                        required
                    />
                    <button
                        type="button"
                        id="randomRoomBtn"
                        class="input-btn"
                        title="Generate random room"
                        aria-label="Generate Random Room"
                    >
                        <i class="fa fa-random"></i>
                    </button>
                </div>
            </div>

            <div class="input-group">
                <label for="username"><i class="fas fa-user"></i> Name</label>
                <div class="input-container">
                    <input
                        id="userNameInput"
                        type="text"
                        name="name"
                        placeholder="Your display name"
                        maxlength="36"
                        required
                    />
                    <button
                        type="button"
                        id="randomUserBtn"
                        class="input-btn"
                        title="Generate random user"
                        aria-label="Generate Random User"
                    >
                        <i class="fa fa-random"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="joinBtn" class="join-button">
                <i class="fas fa-video"></i>
                <span>Join Call</span>
            </button>

            <div class="form-divider"><span>or share this room link after joining</span></div>

            <button id="supportBtn" class="support-btn">&copy; 2026 MiroTalk C2C</button>
        </form>
    </body>
</html>
